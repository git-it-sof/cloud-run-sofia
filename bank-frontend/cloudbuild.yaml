steps:
  # Build the frontend container image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '--build-arg','REACT_APP_API_URL=https://sofiarahul-backend-79505229087.northamerica-northeast2.run.app/api/v1','-t', 'northamerica-northeast2-docker.pkg.dev/$PROJECT_ID/sofiarahul-docker-repo/frontend:latest', './bank-frontend']

  # Push frontend image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'northamerica-northeast2-docker.pkg.dev/$PROJECT_ID/sofiarahul-docker-repo/frontend:latest']

  # Deploy frontend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args: [
      'run', 'deploy', 'sofiarahul-frontend',
      '--image', 'northamerica-northeast2-docker.pkg.dev/$PROJECT_ID/sofiarahul-docker-repo/frontend:latest',
      '--region', 'northamerica-northeast2',
      '--allow-unauthenticated'
    ]

options:
  logging: CLOUD_LOGGING_ONLY